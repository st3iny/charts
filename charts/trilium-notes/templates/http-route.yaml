{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "trilium-notes.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | default $fullName }}
      sectionName: {{ .Values.gateway.listener.name }}
  rules:
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
