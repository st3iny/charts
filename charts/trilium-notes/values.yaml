# Default values for trilium-notes.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: triliumnext/trilium
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "" # Optional, default: release full name

service:
  type: ClusterIP
  port: 8080

dataDir: /srv/trilium-data

persistentVolume:
  enabled: false
  accessModes:
    - ReadWriteOnce
  annotations: {}
  size: 2Gi

gateway:
  create: false # Set to true for a standalone installation
  name: "" # Optional, default: release full name
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  className: "" # Example: traefik
  listener:
    name: https
    hostname: "" # Example: trilium.example.com
    port: 443

httpRoute:
  # In case you are using an existing gateway (gateway.create=false), please also set:
  #   - gateway.name
  #   - gateway.listener.name
  # according to your existing gateway resource.
  enabled: false

# DEPRECATED: Please use the new gateway API above
ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
