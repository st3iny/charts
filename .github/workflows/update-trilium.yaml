name: Update trilium-notes chart

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v6

    - name: Run argus
      run: >-
        docker run --rm
        -v ./:/work
        --env=GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
        --workdir=/work
        ghcr.io/st3iny/argus:main
        --job=trilium
        --job-log=argus-job-log.json

    - name: Extract argus log
      id: job-log
      run: |
        echo "FROM=$(jq -r .trilium.from argus-job-log.json)" >> "$GITHUB_OUTPUT"
        echo "TO=$(jq -r .trilium.to argus-job-log.json)" >> "$GITHUB_OUTPUT"

    - name: Create PR
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: "trilium-notes: bump app from ${{ steps.job-log.outputs.FROM }} to ${{ steps.job-log.outputs.TO }}"
        branch: trilium-notes/${{ steps.job-log.outputs.TO }}
        title: "trilium-notes: bump app from ${{ steps.job-log.outputs.FROM }} to ${{ steps.job-log.outputs.TO }}"
        body: ""
        reviewers: st3iny
        add-paths: charts/trilium-notes
